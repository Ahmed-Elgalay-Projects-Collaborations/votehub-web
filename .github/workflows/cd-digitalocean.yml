name: cd-digitalocean

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: cd-digitalocean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_name: ${{ steps.meta.outputs.image_name }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve Vite API URL
        id: cfg
        shell: bash
        run: |
          VITE_API_URL="${{ vars.VITE_API_URL }}"
          if [ -z "$VITE_API_URL" ]; then
            VITE_API_URL="/api/v1"
          fi
          echo "vite_api_url=$VITE_API_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ steps.cfg.outputs.vite_api_url }}
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ github.sha }}

      - name: Build immutable image reference
        id: image
        run: echo "image_ref=${{ steps.meta.outputs.image_name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      DO_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Setup doctl (optional for exec-plugin kubeconfig)
        if: ${{ env.DO_ACCESS_TOKEN != '' }}
        uses: digitalocean/action-doctl@v2
        env:
          DO_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        with:
          token: ${{ env.DO_ACCESS_TOKEN }}

      - name: Configure kubeconfig
        env:
          DOKS_KUBECONFIG_B64: ${{ secrets.DOKS_KUBECONFIG_B64 }}
        shell: bash
        run: |
          if [ -z "$DOKS_KUBECONFIG_B64" ]; then
            echo "Missing GitHub secret: DOKS_KUBECONFIG_B64"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$DOKS_KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Normalize kubeconfig exec command
        shell: bash
        run: |
          sed -i -E 's#^([[:space:]]*command:[[:space:]]*).*(doctl(\.exe)?)$#\1doctl#g' "$HOME/.kube/config"

      - name: Validate kubeconfig auth requirements
        env:
          DO_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        shell: bash
        run: |
          if grep -q "^[[:space:]]*exec:" "$HOME/.kube/config"; then
            if ! command -v doctl >/dev/null 2>&1; then
              echo "kubeconfig uses exec auth plugin, but doctl is not installed."
              echo "Either set DIGITALOCEAN_ACCESS_TOKEN or upload a non-exec kubeconfig."
              exit 1
            fi

            if [ -z "$DO_ACCESS_TOKEN" ]; then
              echo "kubeconfig uses doctl exec auth, but DIGITALOCEAN_ACCESS_TOKEN is missing."
              echo "Add repo secret DIGITALOCEAN_ACCESS_TOKEN, or upload a static kubeconfig."
              exit 1
            fi
          fi

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/digitalocean

      - name: Set web image to current build
        run: kubectl -n votehub set image deployment/web web=${{ needs.build.outputs.image_ref }}

      - name: Wait for rollout
        run: kubectl -n votehub rollout status deployment/web --timeout=180s

      - name: Print deployed image
        run: kubectl -n votehub get deployment web -o=jsonpath='{.spec.template.spec.containers[0].image}'
