apiVersion: batch/v1
kind: Job
metadata:
  name: votehub-web-smoke-test
  namespace: votehub
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -ec
            - >
              echo "Checking web...";
              curl -fsS http://web:8080/nginx-health;

