apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: votehub
spec:
  replicas: 2
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: votehub-web
  template:
    metadata:
      labels:
        app: votehub-web
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: web
          image: votehub-web:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: votehub
spec:
  selector:
    app: votehub-web
  ports:
    - name: http
      port: 8080
      targetPort: 8080

