apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-web-nginx-config
  namespace: votehub
data:
  default.conf: |
    map $http_x_forwarded_for $client_ip {
      ~^(?<first>[^,]+) $first;
      default $remote_addr;
    }

    map $http_x_forwarded_proto $forwarded_proto {
      default $http_x_forwarded_proto;
      "" $scheme;
    }

    server_tokens off;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    client_max_body_size 100k;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    limit_req_status 429;
    limit_conn_zone $client_ip zone=per_ip:10m;

    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
      }

      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
      add_header Cross-Origin-Opener-Policy "same-origin" always;
      add_header Cross-Origin-Resource-Policy "same-site" always;
      add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: wss:; upgrade-insecure-requests; block-all-mixed-content" always;

      limit_conn per_ip 20;

      location = /nginx-health {
        access_log off;
        return 200 "ok\n";
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location ~ /\. {
        deny all;
      }
    }
