apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-web-nginx-config
  namespace: votehub
data:
  default.conf: |
    map $http_x_forwarded_for $client_ip {
      ~^(?<first>[^,]+) $first;
      default $remote_addr;
    }

    map $http_x_forwarded_proto $forwarded_proto {
      default $http_x_forwarded_proto;
      "" $scheme;
    }

    server_tokens off;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    client_max_body_size 100k;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    limit_req_status 429;
    limit_req_zone $client_ip zone=api_general:10m rate=20r/s;
    limit_req_zone $client_ip zone=auth_login:10m rate=5r/m;
    limit_req_zone $client_ip zone=vote_cast:10m rate=10r/m;
    limit_conn_zone $client_ip zone=per_ip:10m;

    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
      }

      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
      add_header Cross-Origin-Opener-Policy "same-origin" always;
      add_header Cross-Origin-Resource-Policy "same-site" always;
      add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; upgrade-insecure-requests; block-all-mixed-content" always;

      limit_conn per_ip 20;

      location = /nginx-health {
        access_log off;
        return 200 "ok\n";
      }

      location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 15s;

        proxy_pass http://api:3100/metrics;
      }

      location /api/ {
        limit_req zone=api_general burst=60 delay=20;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        add_header Cache-Control "no-store" always;
        proxy_pass http://api:3100;
      }

      location = /api/v1/auth/login {
        limit_req zone=auth_login burst=10 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        add_header Cache-Control "no-store" always;
        proxy_pass http://api:3100;
      }

      location ~ ^/api/v1/elections/[^/]+/votes$ {
        limit_req zone=vote_cast burst=20 delay=5;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        add_header Cache-Control "no-store" always;
        proxy_pass http://api:3100;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location ~ /\. {
        deny all;
      }
    }
